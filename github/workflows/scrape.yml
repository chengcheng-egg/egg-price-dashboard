name: 每日鸡蛋价格抓取

on:
  # 定时触发: 每天北京时间 8:00-18:00，每2小时运行一次 (UTC 0-10)
  schedule:
    - cron: '0 0,2,4,6,8,10 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: 运行爬虫
        run: |
          cd scraper
          python scraper.py
        continue-on-error: true

      - name: 检查数据更新
        id: check_changes
        run: |
          if git diff --quiet data/prices.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "数据无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到数据更新"
          fi

      - name: 提交并推送
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/prices.json
          git commit -m "auto: 更新鸡蛋价格数据 $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M') CST"
          git push

      - name: 触发Pages重新部署
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pages.createDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha
              });
              console.log('Pages deployment triggered');
            } catch (error) {
              console.log('Pages deployment trigger skipped:', error.message);
            }
